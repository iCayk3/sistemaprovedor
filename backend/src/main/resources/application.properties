spring.application.name=controle-instalacao
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
server.error.include-stacktrace=never
server.address=0.0.0.0
server.port=8080
api.security.token.secret=${JWT_SECRET}
api.service.integration.rbx=${LINK_RBX}
api.service.integration.frontend=${API_FRONTEND:http://localhost:5173}
api.service.integration.rbx.chave=${API_KEY}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
