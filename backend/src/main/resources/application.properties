spring.application.name=controle-instalacao
spring.datasource.url=jdbc:postgresql://${SERVER_DB}:5432/${DB}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_SENHA}
spring.datasource.driver-class-name=org.postgresql.Driver
hibernate.dialect=org.hibernate.dialect.HSQLDialect
spring.jpa.hibernate.ddl-auto=update
server.error.include-stacktrace=never
server.address=0.0.0.0
server.port=8080
api.security.token.secret=${JWT_SECRET:12345678}
api.service.integration.rbx=${LINK_RBX}
api.service.integration.frontend=${API_FRONTEND}
api.service.integration.rbx.chave=${API_KEY}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
